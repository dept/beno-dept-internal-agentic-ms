# DEPT Agentic Standard — MCP Server Registry
# Curated, manually-verified registry of official MCP servers.
#
# STALENESS POLICY:
#   - Each entry has a `last_verified` date (YYYY-MM-DD)
#   - Entries not verified in >90 days should be re-checked
#   - Run `scripts/check-mcp-registry.sh` to flag stale entries
#   - When verifying: check npm/pypi package exists, URL resolves, transport matches
#
# ADDING ENTRIES:
#   1. Only add servers with official/verified packages
#   2. Test locally before adding
#   3. Include detection hints matching stack-detection.yml categories
#   4. Set last_verified to today's date
#
# PURPOSE: Curated list of VERIFIED official MCP servers for common technologies.
# This is the PRIMARY source checked by the Discovery Agent — before querying the
#
# public registry (registry.modelcontextprotocol.io), which has no reliable quality
# signal and returns unverified community packages.
#
# MAINTENANCE: Entries here are manually verified against vendor documentation.
# Add entries when a vendor ships an official MCP server. Remove or update when
# a server changes significantly.
#
# TRANSPORT TYPES (metadata — describes the protocol, not a JSON output field):
#   stdio  — local process, launched via npx/node/uvx
#   http   — remote server, uses OAuth or API key in Authorization header
#
# JSON OUTPUT FORMAT:
#   VS Code (.vscode/mcp.json)  → "servers" key; entries use "type": "stdio" or "type": "http"
#   Cursor (.cursor/mcp.json)   → "mcpServers" key; stdio entries need no "type"; http uses "type": "http"
#   Claude Code (.mcp.json)     → "mcpServers" key; same as Cursor

servers:

  # ─── Frontend / Frameworks ────────────────────────────────────────────────

  nextjs:
    display: "Next.js"
    source: "Official — https://github.com/vercel/next-devtools"
    detect: ["next"]
    protocol: stdio
    command: npx
    args: ["-y", "next-devtools-mcp@0.3.6"]
    note: "No env var required. Vercel's own devtools MCP for Next.js projects."
    last_verified: "2026-06-17"

  storybook:
    display: "Storybook"
    source: "Official — https://storybook.js.org/addons/@storybook/addon-mcp"
    detect: ["storybook", "@storybook/react", "@storybook/nextjs"]
    protocol: stdio
    command: npx
    args: ["-y", "@storybook/addon-mcp"]
    note: "No env var required."
    last_verified: "2026-06-17"

  # ─── CMS ──────────────────────────────────────────────────────────────────

  contentful:
    display: "Contentful"
    source: "Official — https://www.contentful.com/developers/docs/tools/mcp-server/"
    detect: ["contentful", "contentful-management"]
    protocol: http
    vscode_config:
      type: "http"
      url: "https://mcp.contentful.com/mcp"
    auth: "OAuth (browser flow on first connect)"
    note: "No npm package. Uses OAuth — no token env var to configure."
    last_verified: "2026-06-17"

  storyblok:
    display: "Storyblok"
    source: "Official — https://www.storyblok.com/docs/mcp-server"
    detect: ["@storyblok/react", "@storyblok/js", "storyblok-js-client"]
    protocol: stdio
    command: npx
    args: ["-y", "@storyblok/mcp"]
    env_var: "STORYBLOK_TOKEN"
    note: "Personal access token from My Account → API Keys"
    last_verified: "2026-06-17"

  # ─── E-commerce ───────────────────────────────────────────────────────────

  shopify:
    display: "Shopify"
    source: "Official — https://shopify.dev/docs/apps/tools/mcp"
    detect: ["@shopify/shopify-api", "@shopify/storefront-api-client", "@shopify/admin-api-client"]
    protocol: stdio
    command: npx
    args: ["-y", "@shopify/dev-mcp@latest"]
    note: "No env var required — authenticates via browser OAuth using Shopify CLI session"
    last_verified: "2026-06-17"

  # ─── Database / ORM ──────────────────────────────────────────────────────

  prisma:
    display: "Prisma ORM"
    source: "Official — https://www.prisma.io/docs/orm/more/development-environment/mcp-server"
    detect: ["@prisma/client", "prisma"]
    protocol: stdio
    command: npx
    args: ["-y", "prisma-mcp"]
    note: "Reads prisma/schema.prisma directly — no env var required. Do NOT confuse with @prismatic-io/prism-mcp which is for the Prismatic integration platform."
    last_verified: "2026-06-17"

  prismatic:
    display: "Prismatic (integration platform)"
    source: "Official — https://prismatic.io/docs/mcp"
    detect: ["@prismatic-io/spectral", "@prismatic-io/embedded"]
    protocol: stdio
    command: npx
    args: ["-y", "@prismatic-io/prism-mcp@1.4.4", "${workspaceRoot}"]
    note: "For Prismatic integration platform only — NOT for Prisma ORM."
    last_verified: "2026-06-17"

  # ─── Deployment ───────────────────────────────────────────────────────────

  vercel:
    display: "Vercel"
    source: "Official — https://vercel.com/docs/mcp"
    detect: ["vercel", "@vercel/og", "@vercel/analytics"]
    protocol: http
    vscode_config:
      type: "http"
      url: "https://mcp.vercel.com"
    auth: "OAuth (browser flow on first connect)"
    note: "Remote server. No token env var needed — uses OAuth."
    last_verified: "2026-06-17"

  netlify:
    display: "Netlify"
    source: "Official — https://docs.netlify.com/ai/mcp/"
    detect: ["netlify"]
    protocol: http
    vscode_config:
      type: "http"
      url: "https://mcp.netlify.com/mcp"
    auth: "OAuth"
    note: "Remote server. Uses OAuth."
    last_verified: "2026-06-17"

  # ─── Project Management ───────────────────────────────────────────────────

  atlassian:
    display: "Atlassian (Jira + Confluence)"
    source: "Official — https://www.atlassian.com/platform/remote-mcp-server"
    detect: ["@atlaskit/jira-rest-client", "jira-client", "@atlassian/jira-software-api"]
    protocol: http
    vscode_config:
      type: "http"
      url: "https://mcp.atlassian.com/v1/mcp"
    auth: "OAuth (browser flow on first connect)"
    note: "Covers Jira, Confluence, and other Atlassian products in one server. Uses OAuth."
    last_verified: "2026-06-17"

  # ─── Design ───────────────────────────────────────────────────────────────

  figma:
    display: "Figma"
    source: "Official — https://help.figma.com/hc/en-us/articles/32132100833559"
    protocol: http
    vscode_config:
      type: "http"
      url: "https://www.figma.com/mcp"
    auth: "OAuth"
    note: "Remote server. Uses OAuth — no token env var needed. Requires Dev or Full seat on Professional+ plan for full access."
    last_verified: "2026-06-17"

  # ─── Observability ────────────────────────────────────────────────────────

  sentry:
    display: "Sentry"
    source: "Official — https://docs.sentry.io/product/sentry-mcp/"
    protocol: http
    vscode_config:
      type: "http"
      url: "https://mcp.sentry.io/mcp"
    auth: "OAuth"
    note: "Remote server. Uses OAuth."
    last_verified: "2026-06-17"

  # ─── Payments ─────────────────────────────────────────────────────────────

  stripe:
    display: "Stripe"
    source: "Official — https://docs.stripe.com/stripe-mcp"
    protocol: http
    vscode_config:
      type: "http"
      url: "https://mcp.stripe.com"
    auth: "OAuth"
    stdio_fallback:
      command: npx
      args: ["-y", "@stripe/mcp", "--tools=all"]
      env_var: "STRIPE_SECRET_KEY"
    note: "Prefer remote OAuth server. Local npx option available if OAuth not feasible."
    last_verified: "2026-06-17"

  # ─── Monorepo ─────────────────────────────────────────────────────────────

  turborepo:
    display: "Turborepo"
    source: "Community — https://github.com/vercel/turborepo/discussions"
    note: "No official MCP server available yet. Skip."
    skip: true
    last_verified: "2026-06-17"
