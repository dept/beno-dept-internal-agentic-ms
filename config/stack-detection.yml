  # ═══════════════════════════════════════════════════════════════════════════
  # MULTI-LANGUAGE / ECOSYSTEM DETECTION
  # Technologies beyond the JS/TS ecosystem, detected via manifest files,
  # project structure, and language-specific config.
  # ═══════════════════════════════════════════════════════════════════════════

  # ─── .NET Ecosystem ──────────────────────────────────────────────────────

  - name: dotnet
    display: ".NET"
    category: backend
    detect:
      config_files: ["*.csproj", "*.sln", "global.json", "*.fsproj"]
    skills_search_terms: ["dotnet", "csharp", "aspnet"]
    notes: "Detected via C#/F# project files or solution files. Covers ASP.NET Core, Blazor, MAUI, etc."

  - name: dotnet-aspnet
    display: "ASP.NET Core"
    category: backend
    detect:
      config_files: ["appsettings.json", "appsettings.Development.json"]
      directories: ["Controllers/", "Pages/", "Views/"]
    skills_search_terms: ["aspnet", "aspnet-core", "dotnet-web"]
    notes: "ASP.NET Core web apps detected via appsettings.json and conventional directories."

  - name: dotnet-fsharp
    display: "F#"
    category: backend
    detect:
      config_files: ["*.fsproj"]
    skills_search_terms: ["fsharp", "dotnet-fsharp"]
    notes: "F# projects detected via .fsproj files."

  # ─── Python Ecosystem ────────────────────────────────────────────────────

  - name: python
    display: "Python"
    category: backend
    detect:
      config_files: ["pyproject.toml", "requirements.txt", "setup.py", "setup.cfg"]
    skills_search_terms: ["python", "python3"]
    notes: "General Python project detected via standard manifest files."

  - name: python-poetry
    display: "Python (Poetry)"
    category: backend
    detect:
      config_files: ["poetry.lock", "pyproject.toml"]
    skills_search_terms: ["python", "poetry"]
    notes: "Poetry-managed Python project. pyproject.toml with [tool.poetry] section."

  - name: python-pipenv
    display: "Python (Pipenv)"
    category: backend
    detect:
      config_files: ["Pipfile", "Pipfile.lock"]
    skills_search_terms: ["python", "pipenv"]
    notes: "Pipenv-managed Python project detected via Pipfile."

  - name: python-uv
    display: "Python (uv)"
    category: backend
    detect:
      config_files: ["uv.lock"]
    skills_search_terms: ["python", "uv"]
    notes: "uv-managed Python project detected via uv.lock."

  - name: django
    display: "Django"
    category: backend
    detect:
      config_files: ["manage.py"]
      directories: ["templates/", "staticfiles/"]
    skills_search_terms: ["django", "python-django"]
    notes: "Django web framework detected via manage.py and conventional directories."

  - name: fastapi
    display: "FastAPI"
    category: backend
    detect:
      config_files: ["pyproject.toml", "requirements.txt"]
      # Look for 'fastapi' in requirements.txt or pyproject.toml dependencies
    skills_search_terms: ["fastapi", "python-fastapi"]
    notes: "FastAPI detected when fastapi appears in Python dependency files."

  - name: flask
    display: "Flask"
    category: backend
    detect:
      config_files: ["pyproject.toml", "requirements.txt"]
      # Look for 'flask' in requirements.txt or pyproject.toml dependencies
    skills_search_terms: ["flask", "python-flask"]
    notes: "Flask detected when flask appears in Python dependency files."

  # ─── Go Ecosystem ────────────────────────────────────────────────────────

  - name: golang
