# Stack Detection Hints
#
# PURPOSE: This file tells the Discovery Agent HOW to detect technologies
# from a project's codebase. It does NOT define skills or MCP servers —
# those are discovered live from public registries at runtime.
#
# RUNTIME BEHAVIOR:
#   Skills:  gh skill search <technology-name>   → choose vendor result, then gh skill install <owner>/<repo> <skill-name> --dir .github/skills
#   MCP:     1) curl https://registry.modelcontextprotocol.io/v0/servers?search=<technology-name>
#            2) fallback: curl https://raw.githubusercontent.com/dept/beno-dept-internal-agentic-ms/main/config/mcp-registry.yml
#            → pick official/highest-quality result
#
# HOW TO READ THIS FILE:
#   The agent reads package.json deps, config file presence, and
#   language-specific manifest files (*.csproj, go.mod, pom.xml, etc.).
#   When a detection rule matches, it uses the `name` as the search term
#   for `gh skill search` and the MCP registry query.
#
# ADDING NEW TECHNOLOGIES:
#   Add a detection rule here with at least one detection method.
#   The agent will then search live registries automatically.
#   You do NOT need to hardcode skill packages or MCP server names.

technologies:

  # ─── Frontend / Frameworks ────────────────────────────────────────────────

  - name: nextjs
    display: "Next.js"
    detect:
      deps: ["next"]
      config_files: ["next.config.js", "next.config.ts", "next.config.mjs"]

