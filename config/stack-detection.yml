    detect:
      config_files: ["main.tf", "*.tf", "terraform.tfvars", ".terraform.lock.hcl"]
      directories: [".terraform/"]
    skills_search_terms: ["terraform", "hashicorp-terraform", "hcl"]
    notes: "Terraform IaC detected via .tf files. Supports AWS, Azure, GCP providers."

  - name: bicep
    display: "Azure Bicep"
    category: infrastructure
    detect:
      config_files: ["*.bicep", "bicepconfig.json"]
    skills_search_terms: ["bicep", "azure-bicep", "azure-infrastructure"]
    notes: "Azure Bicep IaC detected via .bicep files."

  - name: pulumi
    display: "Pulumi"
    category: infrastructure
    detect:
      config_files: ["Pulumi.yaml", "Pulumi.yml"]
      directories: [".pulumi/"]
    skills_search_terms: ["pulumi", "infrastructure-as-code"]
    notes: "Pulumi IaC detected via Pulumi.yaml project file. Supports multiple languages."

  - name: cloudformation
    display: "AWS CloudFormation"
    category: infrastructure
    detect:
      config_files: ["template.yaml", "template.yml", "template.json"]
      directories: ["cloudformation/"]
      # Also detect via AWSTemplateFormatVersion in YAML files
    skills_search_terms: ["cloudformation", "aws-cloudformation", "aws-sam"]
    notes: "AWS CloudFormation/SAM templates detected via template.yaml or cloudformation/ directory."

  - name: kubernetes
    display: "Kubernetes"
    category: infrastructure
    detect:
      config_files: ["k8s.yaml", "k8s.yml", "kustomization.yaml"]
      directories: ["k8s/", "kubernetes/", "charts/"]
    skills_search_terms: ["kubernetes", "k8s", "helm"]
    notes: "Kubernetes manifests and Helm charts detected via conventional directories."

  - name: helm
    display: "Helm"
    category: infrastructure
    detect:
      config_files: ["Chart.yaml", "Chart.yml"]
      directories: ["charts/", "templates/"]
    skills_search_terms: ["helm", "kubernetes-helm"]
    notes: "Helm charts detected via Chart.yaml."

