    skills_search_terms: ["azure-pipelines", "azure-devops"]
    notes: "Azure DevOps Pipelines detected via azure-pipelines.yml."

  - name: gitlab-ci
    display: "GitLab CI"
    category: ci-cd
    detect:
      config_files: [".gitlab-ci.yml"]
    skills_search_terms: ["gitlab-ci", "gitlab"]
    notes: "GitLab CI/CD detected via .gitlab-ci.yml."

  - name: jenkins
    display: "Jenkins"
    category: ci-cd
    detect:
      config_files: ["Jenkinsfile", "jenkins.yml"]
      directories: [".jenkins/"]
    skills_search_terms: ["jenkins", "jenkins-pipeline"]
    notes: "Jenkins CI detected via Jenkinsfile (declarative or scripted pipeline)."

  - name: circleci
    display: "CircleCI"
    category: ci-cd
    detect:
      config_files: [".circleci/config.yml"]
      directories: [".circleci/"]
    skills_search_terms: ["circleci", "circle-ci"]
    notes: "CircleCI detected via .circleci/config.yml."

  # ─── PHP / Laravel ───────────────────────────────────────────────────────

  - name: php
    display: "PHP"
    category: backend
    detect:
      config_files: ["composer.json", "composer.lock"]
    skills_search_terms: ["php", "composer"]
    notes: "PHP project detected via composer.json package manifest."

  - name: laravel
    display: "Laravel"
    category: backend
    detect:
      config_files: ["artisan", "composer.json"]
      directories: ["app/Http/", "routes/", "resources/views/"]
      # Also detect when composer.json contains laravel/framework dependency
    skills_search_terms: ["laravel", "php-laravel"]
    notes: "Laravel framework detected via artisan CLI and conventional directory structure. Confirm via laravel/framework in composer.json."

  - name: symfony
    display: "Symfony"
    category: backend
    detect:
      config_files: ["composer.json", "symfony.lock"]
      directories: ["config/packages/", "src/Controller/"]
      # Also detect when composer.json contains symfony/ dependencies
    skills_search_terms: ["symfony", "php-symfony"]
    notes: "Symfony framework detected via symfony.lock or symfony/ deps in composer.json."

  # ─── Ruby / Rails ────────────────────────────────────────────────────────

  - name: ruby
    display: "Ruby"
    category: backend
    detect:
      config_files: ["Gemfile", "Gemfile.lock", ".ruby-version"]
    skills_search_terms: ["ruby", "rubygems"]
    notes: "Ruby project detected via Gemfile dependency manifest."

  - name: rails
    display: "Ruby on Rails"
    category: backend
    detect:
      config_files: ["Gemfile", "config/routes.rb", "Rakefile"]
      directories: ["app/controllers/", "app/models/", "app/views/", "db/migrate/"]
    skills_search_terms: ["rails", "ruby-on-rails"]
    notes: "Rails framework detected via config/routes.rb and conventional MVC directory structure."

  # ─── Rust ────────────────────────────────────────────────────────────────

  - name: rust
    display: "Rust"
    category: backend
    detect:
      config_files: ["Cargo.toml", "Cargo.lock"]
    skills_search_terms: ["rust", "cargo"]
    notes: "Rust project detected via Cargo.toml manifest."
