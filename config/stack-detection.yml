      config_files: ["go.mod", "go.sum"]
    skills_search_terms: ["golang", "go"]
    notes: "Go projects detected via go.mod module file."

  - name: golang-gin
    display: "Go (Gin)"
    category: backend
    detect:
      config_files: ["go.mod"]
      # Look for 'github.com/gin-gonic/gin' in go.mod
    skills_search_terms: ["golang", "gin", "go-gin"]
    notes: "Gin web framework detected when gin-gonic/gin appears in go.mod."

  - name: golang-echo
    display: "Go (Echo)"
    category: backend
    detect:
      config_files: ["go.mod"]
      # Look for 'github.com/labstack/echo' in go.mod
    skills_search_terms: ["golang", "echo", "go-echo"]
    notes: "Echo web framework detected when labstack/echo appears in go.mod."

  # ─── Java / Kotlin / JVM ─────────────────────────────────────────────────

