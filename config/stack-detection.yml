  - name: java-gradle
    display: "Java/Kotlin (Gradle)"
    category: backend
    detect:
      config_files: ["build.gradle", "build.gradle.kts", "settings.gradle", "settings.gradle.kts"]
    skills_search_terms: ["java", "kotlin", "gradle", "spring"]
    notes: "Gradle-based JVM project detected via build.gradle or build.gradle.kts."

  - name: spring-boot
